<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web template with p5.js</title>
    <link rel="stylesheet" href="./index.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.min.js"></script>
</head>
<style>
</style>
<body>

    <div class="menu-wrapper">
        <div class="menu-icon">☰</div>
        <div class="sidebar"></div>
    </div>

    <main>
        <div class="page" id="page1" title="page 1">
            <div class="top"></div>
            <div class="box">
                        <div class="boxTop">Indholdsliste</div>
                        <h2 class="boxBottom">
                            <button id="nextPageButton1">Calamity</button>
                            <button id="nextPageButton2">Fargos</button>
                        <h2>
                    </div>
            <div class="bottom">
                <div class="left"></div>
                <div class="right"></div>
            </div>
        </div>
        
        
        <div class="page" id="page2" title="page 2">
            <div class="top"></div>
            <button id="nextPageButton2">next page</button>
            <button id="backPageButton2">previous page</button>
            <div class="bottom">
                <div class="left"></div>
                <div class="right"></div>
            </div>
        </div>
        
        
        <div class="page" id="page3" title="page 3">
            <div class="top"></div>
            <button id="backPageButton3">previous page</button>
            <div class="bottom">
                <div class="left"></div>
                <div class="right"></div>
            </div>
        </div>


    </main>
    <script src="./index.js"></script>
</body>
</html>
